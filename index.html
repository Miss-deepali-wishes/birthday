<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    video {
      width: 100%;
      max-width: 500px;
      height: auto;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

  <!-- ⚡ same file name -->
  <video id="video" autoplay playsinline>
    <source src="video501.mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById("video");

    // 🔊 sound ke saath autoplay try
    window.addEventListener("load", () => {
      video.play().catch(() => {
        // agar autoplay block ho gaya to first tap pe start hoga
        document.body.addEventListener("click", () => {
          video.play();
        }, { once: true });
      });
    });

    // 🎬 last frame freeze
    video.addEventListener("ended", () => {
      video.pause();
      video.currentTime = video.duration;
    });
  </script>

</body>
</html>
