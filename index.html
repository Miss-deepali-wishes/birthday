<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    video {
      width: 100%;
      max-width: 500px;
      height: auto;
      background: black;
    }

    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 18px;
      z-index: 10;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- VIDEO -->
  <video id="video" playsinline>
    <source src="video501.mp4" type="video/mp4">
  </video>

  <!-- START SCREEN -->
  <div id="startScreen" class="screen">
    Tap to Start ▶
  </div>

  <!-- RESTART SCREEN -->
  <div id="restartScreen" class="screen" style="display:none;">
    Tap to play again 🔁
  </div>

  <script>
    const video = document.getElementById("video");
    const startScreen = document.getElementById("startScreen");
    const restartScreen = document.getElementById("restartScreen");

    // ▶ START
    startScreen.addEventListener("click", () => {
      video.currentTime = 0;
      video.muted = false;
      video.play();

      startScreen.style.display = "none";
    });

    // 🔁 RESTART
    restartScreen.addEventListener("click", () => {
      video.currentTime = 0;
      video.play();

      restartScreen.style.display = "none";
    });

    // 🎬 END → show restart
    video.addEventListener("ended", () => {
      restartScreen.style.display = "flex";
    });
  </script>

</body>
</html>
