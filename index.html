<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    video {
      width: 100%;
      max-width: 500px;
      height: auto;
      background: black;
    }

    .tap-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>

<body>

  <!-- VIDEO -->
  <video id="video" playsinline>
    <source src="video501.mp4" type="video/mp4">
  </video>

  <!-- TAP SCREEN -->
  <div id="tapScreen" class="tap-screen">
    Tap to Start ▶
  </div>

  <script>
    const video = document.getElementById("video");
    const tapScreen = document.getElementById("tapScreen");

    // 🔥 tap pe video + sound dono start
    tapScreen.addEventListener("click", () => {
      video.muted = false;
      video.currentTime = 0;
      video.play();

      tapScreen.style.display = "none";
    });

    // 🎬 end hone ke baad freeze + close
    video.addEventListener("ended", () => {
      video.pause();
      video.currentTime = video.duration;

      setTimeout(() => {
        window.open('', '_self');
        window.close();

        document.body.innerHTML = "<h2 style='color:white;text-align:center;'>Closed ✔</h2>";
      }, 3000);
    });
  </script>

</body>
</html>
